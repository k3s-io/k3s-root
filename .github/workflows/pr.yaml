name: Pull Request
on:
  pull_request:
    paths-ignore:
      - "**.md"
      - ".github/workflows/actionlint.yaml"
  workflow_dispatch: {}

jobs:
  build:
    name: Build
    strategy:
      fail-fast: true
      matrix:
        arch: [amd64, arm64, arm, riscv64]
    runs-on: ${{ matrix.arch == 'arm64' && (github.repository_owner == 'k3s-io' && 'cncf-ubuntu-24-96-arm' || 'ubuntu-24.04-arm') || (github.repository_owner == 'k3s-io' && 'cncf-ubuntu-24-96-x86' || 'ubuntu-latest') }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

    - name: Build Dockerfile
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
      with:
        context: .
        file: ./Dockerfile
        provenance: mode=min
        target: result
        outputs: type=local,dest=.
        build-args: |
          BUILDARCH=${{ matrix.arch }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: dist-${{ matrix.arch }}
        path: dist/k3s-*${{ matrix.arch }}.tar
        if-no-files-found: error
        retention-days: 1
