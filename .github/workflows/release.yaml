name: Release
on:
  release:
    types:
      - created

jobs:
  release:
    name: Release
    permissions:
      contents: write # Needed to update release with binary assets
      attestations: write # needed for attest action
    strategy:
      fail-fast: true
      matrix:
        arch: [amd64, arm64, arm, riscv64]
    runs-on: ${{ matrix.arch == 'arm64' && (github.repository_owner == 'k3s-io' && 'cncf-ubuntu-24-96-arm' || 'ubuntu-24.04-arm') || (github.repository_owner == 'k3s-io' && 'cncf-ubuntu-24-96-x86' || 'ubuntu-latest') }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

    - name: Build Dockerfile
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
      with:
        context: .
        file: ./Dockerfile
        provenance: mode=min
        target: result
        outputs: type=local,dest=.
        build-args: |
          BUILDARCH=${{ matrix.arch }}

    - name: Compute Checksums
      run: |
        cd dist
        sha256sum k3s-*${{ matrix.arch }}.tar > sha256sum-${{ matrix.arch }}.txt

    - name: Attest Artifacts
      uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
      with:
        subject-path: dist/k3s-*

    - name: Upload Artifacts
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
      with:
        files: |
          dist/k3s-*${{ matrix.arch }}.tar
          dist/*.txt
